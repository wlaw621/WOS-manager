<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOS 관직 예약 매니저</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #060b14;
            --frost-blue: #38bdf8;
            --frost-green: #4ade80;
            --glass-bg: rgba(15, 23, 42, 0.7);
            --glass-border: rgba(56, 189, 248, 0.2);
            --text-main: #f0f9ff;
            --text-dim: #64748b;
            --card-inner: rgba(0, 0, 0, 0.3);
        }

        body {
            margin: 0; padding: 0;
            font-family: 'Noto Sans KR', sans-serif;
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at 50% 0%, #1e293b 0%, #060b14 100%);
            color: var(--text-main);
            display: flex; justify-content: center; min-height: 100vh;
        }

        #app { width: 100%; max-width: 480px; padding: 20px; box-sizing: border-box; display: flex; flex-direction: column; gap: 15px; }

        .glass-panel {
            background: var(--glass-bg); backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); border-radius: 24px; padding: 24px 16px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.6); flex-grow: 1; display: flex; flex-direction: column;
        }

        .header { text-align: center; margin-bottom: 20px; position: relative; }
        
        .lang-toggle {
            position: absolute; top: 0; left: 0; display: flex; background: var(--card-inner);
            border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 2px;
        }
        .lang-btn { font-size: 10px; padding: 4px 8px; border-radius: 15px; cursor: pointer; color: var(--text-dim); transition: 0.3s; }
        .lang-btn.active { background: var(--frost-blue); color: #000; font-weight: 700; }

        .crown { color: #fbbf24; font-size: 24px; }
        h1 { margin: 5px 0 0 0; font-size: 20px; font-weight: 700; }

        .page { display: none; flex-direction: column; height: 100%; }
        .page.active { display: flex; }

        .tab-bar { display: flex; gap: 6px; margin-bottom: 15px; }
        .tab {
            flex: 1; padding: 10px 2px; background: var(--card-inner); border-radius: 50px;
            font-size: 11px; color: var(--text-dim); cursor: pointer; text-align: center; border: 1px solid transparent;
        }
        .tab.active { background: rgba(56, 189, 248, 0.15); border-color: var(--frost-blue); color: #fff; }

        .tz-selector { display: flex; justify-content: center; gap: 20px; margin-bottom: 10px; }
        .tz-btn { font-size: 13px; color: var(--text-dim); cursor: pointer; position: relative; padding-bottom: 4px; }
        .tz-btn.active { color: #fff; font-weight: 700; }
        .tz-btn.active::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 2px; background: var(--frost-blue); }

        .time-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; overflow-y: auto; max-height: 55vh; }
        .slot {
            aspect-ratio: 1.5 / 1; border-radius: 12px; display: flex; align-items: center; justify-content: center;
            font-size: 14px; font-weight: 700; cursor: pointer; background: var(--card-inner); border: 1px solid transparent;
        }
        .slot-available { border-color: rgba(56, 189, 248, 0.2); color: var(--frost-blue); }
        .slot-mine { border-color: var(--frost-green); color: var(--frost-green); }
        .slot-taken { opacity: 0.3; cursor: not-allowed; color: var(--text-dim); }

        .status-list { flex-grow: 1; overflow-y: auto; max-height: 55vh; }
        .status-item {
            display: flex; align-items: center; padding: 12px; margin-bottom: 8px;
            background: var(--card-inner); border-radius: 12px; border: 1px solid rgba(255,255,255,0.05);
        }
        .st-time { width: 60px; font-weight: 700; color: var(--frost-blue); }
        .st-info { flex: 1; font-size: 13px; }
        .st-tag { font-size: 10px; padding: 2px 6px; border-radius: 4px; margin-right: 8px; background: rgba(255,255,255,0.1); }

        .footer { margin-top: auto; padding-top: 10px; }
        .btn-nav {
            width: 100%; padding: 16px; border-radius: 16px; font-weight: 700; cursor: pointer;
            background: linear-gradient(180deg, rgba(56, 189, 248, 0.2) 0%, rgba(15, 23, 42, 0.6) 100%);
            color: #fff; border: 1px solid var(--glass-border);
        }

        .modal-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(10px); z-index: 1000;
            align-items: center; justify-content: center; padding: 20px;
        }
        .modal { background: #0f172a; border: 1px solid var(--glass-border); width: 100%; max-width: 320px; border-radius: 20px; padding: 24px; }
        input { width: 100%; padding: 12px; background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; color: #fff; margin-bottom: 12px; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; }
        .btn-primary { background: var(--frost-blue); color: #000; }
        .btn-secondary { background: rgba(255,255,255,0.1); color: #fff; }
        .loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; align-items: center; justify-content: center; z-index: 9999; }
    </style>
</head>
<body>

<div id="loading" class="loading"><div style="color: white;">Loading...</div></div>

<div id="app">
    <div id="page-main" class="page active">
        <div class="glass-panel">
            <div class="header">
                <div class="lang-toggle">
                    <div class="lang-btn active" onclick="setLang('KOR')" id="lang-kor">KOR</div>
                    <div class="lang-btn" onclick="setLang('ENG')" id="lang-eng">ENG</div>
                </div>
                <div class="crown">👑</div>
                <h1 id="main-title">WOS 관직 예약 매니저</h1>
            </div>
            <div class="controls">
                <div class="tab-bar">
                    <div class="tab active" onclick="setDay('day1')" id="tab-day1">DAY1 건설</div>
                    <div class="tab" onclick="setDay('day2')" id="tab-day2">DAY2 연구</div>
                    <div class="tab" onclick="setDay('day4')" id="tab-day4">DAY4 훈련</div>
                </div>
                <div class="tz-selector">
                    <div class="tz-btn active" onclick="setTz('UTC')" name="tz-utc">UTC</div>
                    <div class="tz-btn" onclick="setTz('KST')" name="tz-kst">KST(한국)</div>
                </div>
            </div>
            <div class="time-grid" id="grid"></div>
        </div>
        <div class="footer"><button class="btn-nav" onclick="switchPage('status')" id="nav-status-text">전체 예약 현황 보기</button></div>
    </div>

    <div id="page-status" class="page">
        <div class="glass-panel">
            <div class="header">
                <h1 id="status-title">전체 예약 현황</h1>
                <div class="tz-selector" style="margin-top: 10px;">
                    <div class="tz-btn active" onclick="setTz('UTC')" name="tz-utc">UTC</div>
                    <div class="tz-btn" onclick="setTz('KST')" name="tz-kst">KST(한국)</div>
                </div>
                <div id="status-day-label" style="font-size: 11px; color: var(--text-dim); margin-top: 10px;"></div>
            </div>
            <div class="status-list" id="status-list"></div>
        </div>
        <div class="footer"><button class="btn-nav" onclick="switchPage('main')" id="nav-main-text">돌아가기</button></div>
    </div>
</div>

<div class="modal-overlay" id="reserveOverlay">
    <div class="modal">
        <div id="modalTitle" style="text-align:center; margin-bottom:20px; font-weight:700;">예약</div>
        <input type="text" id="inputAlliance" placeholder="연맹명">
        <input type="text" id="inputPlayer" placeholder="캐릭터명">
        <div class="modal-btns">
            <button class="btn btn-secondary" onclick="closeModal()">취소</button>
            <button class="btn btn-primary" onclick="confirmReservation()">확정</button>
        </div>
    </div>
</div>

<script>
    const GAS_URL = '여기에_본인의_배포_URL_입력'; //

    let state = {
        lang: 'KOR',
        currentDay: 'day1',
        timezone: 'UTC',
        db: { day1: {}, day2: {}, day4: {} },
        myPlayerName: localStorage.getItem('wos_playerName') || null
    };

    const i18n = {
        KOR: { mainTitle: "WOS 관직 예약 매니저", statusTitle: "전체 예약 현황", day1: "DAY1 건설", day2: "DAY2 연구", day4: "DAY4 훈련", empty: "예약 없음", daySuffix: " 기준" },
        ENG: { mainTitle: "WOS Official Manager", statusTitle: "Reservation Status", day1: "DAY1 Build", day2: "DAY2 Tech", day4: "DAY4 Train", empty: "No Data", daySuffix: "" }
    };

    function showLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }

    function setTz(tz) {
        state.timezone = tz;
        // 모든 페이지의 타임존 버튼 상태 동기화
        document.querySelectorAll('.tz-btn').forEach(btn => {
            btn.classList.toggle('active', btn.getAttribute('onclick').includes(tz));
        });
        renderGrid();
        renderStatusList();
    }

    function setDay(day) {
        state.currentDay = day;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.id === `tab-${day}`));
        renderGrid();
        renderStatusList();
    }

    function switchPage(p) {
        document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
        document.getElementById(`page-${p}`).classList.add('active');
        if(p === 'status') renderStatusList();
    }

    function renderGrid() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        for (let i = 0; i < 48; i++) {
            const totalMin = i * 30;
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            const utcKey = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
            
            let displayH = state.timezone === 'KST' ? (h + 9) % 24 : h;
            const displayTime = `${String(displayH).padStart(2, '0')}:${String(m).padStart(2, '0')}`;

            const slot = document.createElement('div');
            slot.className = 'slot ' + (state.db[state.currentDay][utcKey] ? 'slot-taken' : 'slot-available');
            slot.innerText = displayTime;
            if(!state.db[state.currentDay][utcKey]) slot.onclick = () => openModal(utcKey);
            grid.appendChild(slot);
        }
    }

    function renderStatusList() {
        const list = document.getElementById('status-list');
        const label = document.getElementById('status-day-label');
        if(!list) return;

        label.innerText = `${i18n[state.lang][state.currentDay]}${i18n[state.lang].daySuffix} (${state.timezone})`;
        list.innerHTML = '';

        for (let i = 0; i < 48; i++) {
            const totalMin = i * 30;
            const h = Math.floor(totalMin / 60);
            const m = totalMin % 60;
            const utcKey = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;
            
            let displayH = state.timezone === 'KST' ? (h + 9) % 24 : h;
            const displayTime = `${String(displayH).padStart(2, '0')}:${String(m).padStart(2, '0')}`;

            const data = state.db[state.currentDay][utcKey];
            const item = document.createElement('div');
            item.className = 'status-item';
            item.innerHTML = `<div class="st-time">${displayTime}</div><div class="st-info">${data ? `<span class="st-tag">${data.alliance}</span><strong>${data.player}</strong>` : `<span style="color:#64748b">${i18n[state.lang].empty}</span>`}</div>`;
            list.appendChild(item);
        }
    }

    function refreshData() {
        showLoading(true);
        fetch(`${GAS_URL}?action=getReservations`)
            .then(res => res.json())
            .then(data => { state.db = data; renderGrid(); renderStatusList(); showLoading(false); })
            .catch(() => showLoading(false));
    }

    function openModal(t) { state.selectedTime = t; document.getElementById('reserveOverlay').style.display = 'flex'; }
    function closeModal() { document.getElementById('reserveOverlay').style.display = 'none'; }

    function confirmReservation() {
        const al = document.getElementById('inputAlliance').value || 'TNT';
        const pl = document.getElementById('inputPlayer').value;
        if(!pl) return alert('캐릭터명을 입력하세요');
        
        showLoading(true);
        const params = new URLSearchParams({ action: 'add', day: state.currentDay, time: state.selectedTime, alliance: al, player: pl });
        fetch(`${GAS_URL}?${params.toString()}`).then(() => { closeModal(); refreshData(); });
    }

    window.onload = refreshData;
</script>
</body>
</html>
